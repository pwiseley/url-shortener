<div class="page">
  <div class="wide">
    <header class="d-flex justify-content-between align-items-start pb-3 header-line">
      <div>
        <h1 class="brand mb-0">Short it</h1>
        <div class="subtitle">A simple tool to shorten your URLs</div>
      </div>
      <nav class="d-flex align-items-center gap-3">
        <a [href]="githubUrl" target="_blank" rel="noreferrer" class="nav-link-sober d-flex align-items-center gap-1">
          <i class="bi bi-github"></i> GitHub
        </a>
        <a [href]="docsUrl" target="_blank" rel="noreferrer" class="nav-link-sober">Documentation</a>
      </nav>
    </header>
  </div>

  <div class="narrow">
    <div class="text-center mt-5 mb-4">
      <h2 class="headline">Shorten your URL</h2>
    </div>

    <div class="input-shell d-flex align-items-center">
      <input
        type="url"
        class="url-input flex-grow-1"
        placeholder="Paste your long URL here"
        [(ngModel)]="longUrlValue"
        (keyup.enter)="shorten()"
      />
      <button class="btn-shorten" (click)="shorten()" [disabled]="loading()">
        {{ loading() ? 'Working…' : 'Shorten' }}
      </button>
    </div>

    @if (error()) {
    <div class="error-box mt-3">{{ error() }}</div>
    }

    @if (result()) {
    <div class="result-box mt-4 d-flex align-items-center justify-content-between">
      <a [href]="result()!.shortUrl" target="_blank" rel="noreferrer" class="short-link">
        {{ displayUrl(result()!.shortUrl) }}
      </a>
      <button class="btn-copy" (click)="copyToClipboard()" [title]="copied() ? 'Copied' : 'Copy'">
        @if (copied()) {
        <span class="copied-text">Copied</span>
        } @else {
        <i class="bi bi-clipboard"></i>
        }
      </button>
    </div>
    }

    <div class="demo-section mt-5">
      <div class="demo-label">Demo</div>
      <div class="demo-frame d-flex align-items-center justify-content-center">
        <span class="demo-placeholder">Demo video coming soon</span>
      </div>
    </div>
  </div>

  <footer class="footer-bar">
    <div class="wide text-center">© 2026 · All rights reserved</div>
  </footer>
</div>
